version: 2.1

# See latest version of Gusto orbs at https://circleci.com/orbs/registry/orb/gusto/gusto
orbs:
  ruby: circleci/ruby@2.1.1
  gusto: gusto/gusto@0.0.12

jobs:
  ruby-test:
    docker:
      - image: cimg/ruby:3.3.0
    steps:
      - checkout
      - setup_remote_docker
      - ruby/install-deps
      - run:
          command: bundle exec rake
          name: "Run tests"
      - store_artifacts:
          path: coverage
  release:
    executor: gusto/ruby-2-3
    steps:
      - gusto/semantic-release-ruby

workflows:
  version: 2
  main:
    jobs:
      - gusto/ruby-lint
      - ruby-test
      - release:
          filters:
            branches:
              only: master
          requires:
            - gusto/ruby-lint
            - ruby-test
